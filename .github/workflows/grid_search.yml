name: Grid Search

on:
  workflow_dispatch:
    inputs:
      optimizer:
        description: "Que optimizador(es) ejecutar"
        type: choice
        options: [all, umda, egna, emna, keda]
        default: all
      xdsl_path:
        description: "Ruta al .xdsl (vacio = usa el del script)"
        type: string
        default: ""
      rules_csv:
        description: "Ruta al CSV de reglas (vacio = usa el del script)"
        type: string
        default: ""
      min_max_ut:
        description: "Anclar min/max de utilidades a la red original"
        type: choice
        options: [default, "true", "false"]
        default: default
      base_folder:
        description: "Carpeta de salida de los CSVs (debe coincidir con la red)"
        type: string
        default: "example/nhlv1"
      fresh_start:
        description: "Borrar grid_search_*.csv del optimizador seleccionado antes de empezar"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        shell: bash
        run: |
          case "${{ inputs.optimizer }}" in
            all) echo 'matrix=["umda","egna","emna","keda"]' >> "$GITHUB_OUTPUT" ;;
            *)   echo 'matrix=["${{ inputs.optimizer }}"]' >> "$GITHUB_OUTPUT" ;;
          esac

  run:
    needs: setup
    runs-on: windows-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        optimizer: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      # Sin esto, los print() del script quedan bufferados y los logs de GH Actions
      # parecen "colgados" durante horas hasta que el buffer se vacia.
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # EDAspy importa varios paquetes transitivamente pero no los declara como deps:
          # pandas, pybnesian, pgmpy, matplotlib, networkx. Los instalamos explicitos.
          pip install numpy scipy pandas pybnesian pgmpy matplotlib networkx EDAspy
          pip install vendor/pysmile-2.4.0-cp313-cp313-win_amd64.whl

      - name: Smoke test (pysmile + EDAspy cargan)
        shell: pwsh
        run: |
          python -c "import pysmile_license; import pysmile; print('pysmile OK', pysmile.__file__)"
          python -c "from EDAspy.optimization import UMDAc, EGNA, EMNA; print('EDAspy OK')"

      - name: Wipe previous CSVs if requested
        if: ${{ inputs.fresh_start }}
        shell: pwsh
        run: |
          $suffix = "${{ matrix.optimizer }}".ToUpper()
          $folder = "${{ inputs.base_folder }}"
          Remove-Item "$folder/grid_search_results_$suffix.csv" -ErrorAction SilentlyContinue
          Remove-Item "$folder/grid_search_curves_$suffix.csv"  -ErrorAction SilentlyContinue

      - name: Build CLI args
        id: args
        shell: pwsh
        run: |
          $cli = "--optimizer_type ${{ matrix.optimizer }} --base_folder ""${{ inputs.base_folder }}"""
          if ("${{ inputs.xdsl_path }}" -ne "") { $cli += " --xdsl_path ""${{ inputs.xdsl_path }}""" }
          if ("${{ inputs.rules_csv }}" -ne "") { $cli += " --rules_csv ""${{ inputs.rules_csv }}""" }
          if ("${{ inputs.min_max_ut }}" -ne "default") { $cli += " --min_max_ut ${{ inputs.min_max_ut }}" }
          "cli=$cli" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          # Sufijo en mayusculas para los CSVs (grid_search.py escribe *_UMDA.csv, *_EGNA.csv, *_EMNA.csv)
          $suffix = "${{ matrix.optimizer }}".ToUpper()
          "ARTIFACT_SUFFIX=$suffix" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "CLI args: $cli"
          Write-Host "Artifact suffix: $suffix"

      - name: Run grid search (${{ matrix.optimizer }})
        shell: pwsh
        run: python -u grid_search.py ${{ steps.args.outputs.cli }}

      - name: Upload CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grid-${{ matrix.optimizer }}-run-${{ github.run_number }}
          # Solo los CSVs de este optimizador, no arrastrar los de otros optimizadores
          # que vienen del checkout (commiteados por runs anteriores).
          path: |
            ${{ inputs.base_folder }}/grid_search_results_*.csv
            ${{ inputs.base_folder }}/grid_search_curves_*.csv
          if-no-files-found: warn

  commit:
    needs: run
    if: ${{ always() && needs.run.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move CSVs into place
        shell: bash
        env:
          BASE_FOLDER: ${{ inputs.base_folder }}
        run: |
          mkdir -p "$BASE_FOLDER"
          find artifacts -name 'grid_search_*.csv' -exec cp -v {} "$BASE_FOLDER"/ \;
          ls -lh "$BASE_FOLDER"/grid_search_*.csv || true

      - name: Commit results
        shell: bash
        env:
          BASE_FOLDER: ${{ inputs.base_folder }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add "$BASE_FOLDER"/grid_search_results_*.csv "$BASE_FOLDER"/grid_search_curves_*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # rebase contra el remoto por si llegaron commits mientras tanto
            git pull --rebase origin "${{ github.ref_name }}" || true
            git commit -m "grid_search: update results from CI run #${{ github.run_number }}"
            git push
          fi
